version: '3.8'

services:

  backend:

    build: ./backend

    container_name: backend

    ports:
      - "8080:8080"


  frontend:

    image: nginx

    container_name: frontend

    ports:
      - "80:80"

    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend